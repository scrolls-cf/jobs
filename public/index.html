<!DOCTYPE html>
<html lang="en" data-theme="devscrolls">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Devscrolls app (scaffold)" />
    <title>Devscrolls</title>
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body class="bg-base-100 text-base-content antialiased">
    <main
      class="relative flex min-h-screen flex-col items-center justify-center gap-12 overflow-hidden px-6 py-20"
    >
      <div
        class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,color-mix(in_oklab,var(--color-primary)_22%,transparent),transparent_55%)]"
        aria-hidden="true"
      ></div>

      <div class="relative flex flex-col items-center gap-10">
        <img
          src="/assets/logo.svg"
          alt="Devscrolls"
          width="112"
          height="112"
          class="size-28 drop-shadow-lg sm:size-32"
          decoding="async"
        />
      </div>
    </main>
  </body>
</html>
