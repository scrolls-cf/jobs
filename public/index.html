<!DOCTYPE html>
<html lang="en" data-theme="dim">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="scrollsmatrix jobs board" />
    <title>jobs · scrollsmatrix</title>
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body class="bg-base-100 text-base-content antialiased">
    <main
      data-jobs-root
      class="relative flex min-h-screen flex-col items-center justify-center gap-12 overflow-hidden px-6 py-16 sm:gap-14 sm:py-20"
    >
      <div
        class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,color-mix(in_oklab,var(--color-primary)_22%,transparent),transparent_55%)]"
        aria-hidden="true"
      ></div>

      <div class="relative z-10 flex w-full max-w-3xl flex-col items-center gap-10">
        <header
          class="flex flex-col items-center gap-3 text-center"
          aria-label="scrollsmatrix jobs"
        >
          <div
            class="splash-cage relative flex h-44 w-44 items-center justify-center will-change-transform sm:h-48 sm:w-48"
          >
            <div
              class="splash-ring pointer-events-none absolute inset-0 rounded-3xl border-2 border-primary/55 bg-base-100/10 shadow-[inset_0_0_48px_color-mix(in_oklab,var(--color-primary)_12%,transparent),0_0_0_1px_color-mix(in_oklab,var(--color-base-100)_40%,transparent)] will-change-transform"
              aria-hidden="true"
            ></div>
            <div
              class="splash-clip absolute inset-[3px] flex items-center justify-center overflow-hidden rounded-[calc(1.5rem-3px)] will-change-transform"
            >
              <img
                src="/assets/logo.svg"
                alt=""
                width="112"
                height="112"
                class="splash-logo relative z-10 size-24 drop-shadow-[0_0_24px_color-mix(in_oklab,var(--color-primary)_30%,transparent)] will-change-transform sm:size-28"
                decoding="async"
                aria-hidden="true"
              />
            </div>
          </div>
          <div class="space-y-0.5">
            <p class="text-sm font-medium lowercase tracking-wide text-base-content/80">scrollsmatrix</p>
            <p class="text-[0.65rem] font-semibold uppercase tracking-[0.38em] text-primary/90">jobs</p>
          </div>
        </header>

        <div class="relative w-full">
          <div
            class="pointer-events-none absolute inset-0 rounded-3xl border-2 border-primary/55 bg-base-100/10 shadow-[inset_0_0_48px_color-mix(in_oklab,var(--color-primary)_12%,transparent),0_0_0_1px_color-mix(in_oklab,var(--color-base-100)_40%,transparent)]"
            aria-hidden="true"
          ></div>
          <section
            id="job-board"
            class="relative m-[3px] rounded-[calc(1.5rem-3px)] border border-base-content/10 bg-base-200/90 shadow-xl backdrop-blur-sm"
            aria-label="Jobs"
          >
            <div class="flex flex-col gap-4 p-5 sm:p-8">
            <div class="flex justify-end">
              <span id="job-count" class="badge badge-neutral badge-outline">…</span>
            </div>

            <div id="job-list-wrap">
              <ul
                id="job-list"
                class="list-none divide-y divide-base-content/5 overflow-hidden rounded-box bg-base-200/80 ring-1 ring-base-content/5"
                role="list"
                hidden
              ></ul>
              <div
                id="job-list-loading"
                class="flex flex-col items-center justify-center gap-3 py-16"
                aria-live="polite"
              >
                <span class="loading loading-spinner loading-lg text-primary"></span>
                <p class="text-base-content/60 text-sm">Loading jobs…</p>
              </div>
              <div id="job-list-error" class="alert alert-error hidden text-sm" role="alert"></div>
            </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <dialog id="job-detail" class="modal" aria-labelledby="job-detail-title">
      <div
        class="modal-box relative max-w-lg border border-primary/25 bg-base-200 shadow-xl ring-1 ring-primary/15"
      >
        <form method="dialog">
          <button
            type="submit"
            class="btn btn-sm btn-circle btn-ghost text-base-content/70 absolute right-3 top-3"
            aria-label="Close"
          >
            ✕
          </button>
        </form>
        <h2
          id="job-detail-title"
          class="pr-10 text-lg font-semibold uppercase leading-snug tracking-wide text-base-content"
        ></h2>
        <div
          id="job-detail-prose"
          class="prose prose-invert prose-sm mt-4 max-w-none prose-p:leading-relaxed prose-p:text-base-content/90"
        ></div>
      </div>
      <form method="dialog" class="modal-backdrop bg-base-content/50">
        <button type="submit" class="absolute inset-0 cursor-default opacity-0" tabindex="-1">
          Close
        </button>
      </form>
    </dialog>

    <template id="job-row-template">
      <li
        class="group list-none px-4 py-4 hover:bg-base-100/40 focus-visible:bg-base-100/40 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/40"
        role="button"
        tabindex="0"
        data-job-row
      >
        <div class="flex min-w-0 flex-col gap-1.5">
          <p
            class="text-sm font-semibold uppercase leading-snug tracking-wide text-base-content"
            data-title
          ></p>
          <p class="text-base-content/65 line-clamp-2 text-sm leading-snug" data-summary></p>
        </div>
      </li>
    </template>

    <script type="module">
      const listEl = document.getElementById('job-list')
      const countEl = document.getElementById('job-count')
      const loadingEl = document.getElementById('job-list-loading')
      const errorEl = document.getElementById('job-list-error')
      const template = document.getElementById('job-row-template')
      const dialogEl = document.getElementById('job-detail')
      const modalTitle = document.getElementById('job-detail-title')
      const modalProse = document.getElementById('job-detail-prose')

      function showError(message) {
        loadingEl.classList.add('hidden')
        errorEl.textContent = message
        errorEl.classList.remove('hidden')
      }

      /**
       * @param {HTMLElement} wrap
       * @param {string} text
       */
      function fillJobDetailProse(wrap, text) {
        wrap.replaceChildren()
        const body = (text ?? '').trim()
        if (!body) return
        const chunks = body.split(/\n\n+/).filter(Boolean)
        for (const chunk of chunks.length ? chunks : [body]) {
          const p = document.createElement('p')
          p.textContent = chunk.trim()
          wrap.appendChild(p)
        }
      }

      /** @param {{ title: string, summary: string, detail?: string }} job */
      function openJobModal(job) {
        modalTitle.textContent = job.title
        const longText = job.detail?.trim() ? job.detail : job.summary
        fillJobDetailProse(modalProse, longText)
        dialogEl.showModal()
      }

      dialogEl.addEventListener('click', (e) => {
        const box = dialogEl.querySelector('.modal-box')
        if (box && !box.contains(e.target)) {
          dialogEl.close()
        }
      })

      function wireRow(li, job) {
        const open = () => openJobModal(job)
        li.addEventListener('click', open)
        li.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault()
            open()
          }
        })
      }

      try {
        const res = await fetch('/api/jobs')
        if (!res.ok) throw new Error(`Could not load jobs (${res.status})`)
        const data = await res.json()
        const jobs = data.jobs
        if (!Array.isArray(jobs)) throw new Error('Invalid response')

        countEl.textContent = `${jobs.length} jobs`
        listEl.innerHTML = ''

        for (const job of jobs) {
          const node = template.content.cloneNode(true)
          const li = node.querySelector('[data-job-row]')
          li.dataset.jobId = job.id
          node.querySelector('[data-title]').textContent = job.title
          node.querySelector('[data-summary]').textContent = job.summary
          wireRow(li, job)
          listEl.appendChild(li)
        }

        loadingEl.classList.add('hidden')
        listEl.hidden = false
      } catch (e) {
        showError(e instanceof Error ? e.message : 'Something went wrong')
      }
    </script>
  </body>
</html>
